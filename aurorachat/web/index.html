<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AuroraChat Web</title>
        <script src="v7.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="welcome">
            <img src="logo.png"><br>
            Real Time Chatting for the 3DS, Wii, Wii U and Web
            <br><br>
            <button id="welcome-login">Log in</button>
            <button id="welcome-register">Sign up</button>
        </div>

        <form id="loginform">
            <img src="logo.png"><br>
            <h3>Login</h3>
            <input type="text" name="login" placeholder="Login"><br>
            <input type="password" name="passwd" placeholder="Password"><br>
            <br>
            <button type="submit">Log in</button>
        </form>

        <form id="registerform">
            <img src="logo.png"><br>
            <h3>Sign Up</h3>
            <input type="text" name="login" placeholder="Login"><br>
            <input type="password" name="passwd" placeholder="Password"><br>
            <input type="password" name="passwd2" placeholder="Repeat Password"><br>
            <br>
            <button type="submit">Sign up</button>
        </form>

        <label id="chatui" for="msg">
            <div id="titlebar">
                <img src="logo.png">
                <div id="servername"></div>
            </div>
            <form id="roominput">
                #
                <input type="text" name="room" id="room" value="general">
                <button type="submit">Join</button>
            </form>
            <div id="messages"></div>
            <form id="msginput">
                <input type="text" name="msg" id="msg">
                <button type="submit">Send</button>
            </form>
        </label>
    </body>
</html>
